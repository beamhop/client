<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Opaque light fill — iOS draws a black box behind any transparency -->
  <rect width="180" height="180" fill="#f4f5f7" />
  <!-- Logo (32-unit viewBox) scaled to ~70% and centered -->
  <g transform="translate(90 90) scale(3.94) translate(-16 -16)">
    <rect width="32" height="32" rx="9" fill="url(#verity-lg)" />
    <path d="M16 7.5l6.4 8.5-6.4 8.5L9.6 16 16 7.5z" fill="#fff" fill-opacity=".96" />
    <circle cx="16" cy="16" r="2.5" fill="url(#verity-lg)" />
  </g>
  <defs>
    <linearGradient id="verity-lg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b54f0" />
      <stop offset="1" stop-color="#8b82ff" />
    </linearGradient>
  </defs>
</svg>
